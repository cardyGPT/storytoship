version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: formio_db
    ports:
      - "5432:5432"
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
    depends_on:
      - db
  frontend:
    build: ./frontend
    ports:
      - "4200:4200"