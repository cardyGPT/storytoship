version: '3.8'
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cardinality
    ports:
    - "5432:5432"
  
  backend:
    build: ./backend
    ports:
    - "3000:3000"
    environment:
      DB_HOST: db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: cardinality
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
    - "4200:4200"
