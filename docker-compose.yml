services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: pics_db
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
  backend:
    build: 
      context: ./backend
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - postgres
  frontend:
    build:
      context: ./frontend
    ports:
      - "4200:4200"
